apiVersion: apps/v1
kind: Deployment
metadata: 
  name: front
  labels:
    app: front
spec:
  replicas: 3
  selector:
    matchLabels:
      app: front

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: front
    spec:
      nodeSelector:
        env: test
      containers:
        - name: front
          image: nginx
    
          ports:
            - containerPort: 80
              
      

