apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fit-route
  namespace: demo
spec:
  parentRefs:
    - name: demo-gw
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /fit
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: fit-svc
          port: 5000
---
